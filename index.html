<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffe4ec">
<title>For Chantille 💗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#ffe4ec;
    --blush-2:#ffd0de;
    --pink:#ff5c8d;
    --pink-dark:#f0437a;
    --pink-soft:#ffb3c9;
    --ink:#7a3b52;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Baloo 2','Segoe UI',system-ui,sans-serif;
    background:linear-gradient(180deg,#fff0f5 0%,var(--blush) 55%,var(--blush-2) 100%);
    color:var(--ink);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
    overflow-x:hidden;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }

  /* ---------- falling petals ---------- */
  .petal{
    position:fixed;
    top:-8vh;
    pointer-events:none;
    z-index:1;
    opacity:.75;
    animation:fall linear infinite;
    will-change:transform;
  }
  .petal.sway{animation-name:fall-sway}
  @keyframes fall{
    0%  {transform:translateY(-8vh) rotate(0deg)}
    100%{transform:translateY(115vh) rotate(340deg)}
  }
  @keyframes fall-sway{
    0%  {transform:translateY(-8vh) translateX(0) rotate(0deg)}
    25% {transform:translateY(22vh) translateX(6vw) rotate(80deg)}
    50% {transform:translateY(52vh) translateX(-5vw) rotate(160deg)}
    75% {transform:translateY(82vh) translateX(5vw) rotate(250deg)}
    100%{transform:translateY(115vh) translateX(-3vw) rotate(340deg)}
  }

  /* ---------- card ---------- */
  .card{
    position:relative;
    z-index:2;
    background:#fff;
    width:min(92vw,360px);
    border-radius:30px;
    padding:38px 26px 34px;
    text-align:center;
    box-shadow:0 18px 45px rgba(255,92,141,.22), 0 4px 12px rgba(255,92,141,.12);
  }
  .card .top-emoji{font-size:44px;display:block;margin-bottom:10px}
  h1{
    font-size:clamp(24px,6.4vw,30px);
    font-weight:800;
    line-height:1.25;
    margin-bottom:26px;
  }
  .pop{animation:pop .45s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{
    0%{transform:scale(.82);opacity:.4}
    100%{transform:scale(1);opacity:1}
  }

  /* ---------- buttons ---------- */
  .btns{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    min-height:150px;
    justify-content:center;
  }
  .btn{
    font-family:inherit;
    font-size:20px;
    font-weight:700;
    border:none;
    border-radius:999px;
    padding:14px 42px;
    min-height:48px;
    cursor:pointer;
    transition:transform .4s cubic-bezier(.34,1.56,.64,1), box-shadow .3s, background .3s, color .3s;
    will-change:transform;
  }
  .btn:active{filter:brightness(.95)}
  .btn-yes{
    background:linear-gradient(135deg,var(--pink) 0%,var(--pink-dark) 100%);
    color:#fff;
    box-shadow:0 8px 20px rgba(255,92,141,.45);
  }
  .btn-no{
    background:#fff;
    color:#b98a9b;
    border:2px solid var(--blush-2);
  }
  .btn-no.as-yes{
    background:linear-gradient(135deg,var(--pink) 0%,var(--pink-dark) 100%);
    color:#fff;
    border:none;
    box-shadow:0 8px 20px rgba(255,92,141,.45);
  }
  /* final screen: force both buttons to identical size */
  .btn.twin{width:200px;padding:14px 0}

  /* ---------- win screen ---------- */
  #win{display:none}
  #win.show{display:block}
  #win h1{margin-bottom:6px}
  #win .sub{font-size:17px;font-weight:600;color:#c76a8a;margin-bottom:22px}
  .badge{
    width:150px;height:150px;
    margin:0 auto 20px;
    animation:float 3.5s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
  }
  .msg{
    background:#fff6f9;
    border:2px dashed var(--blush-2);
    border-radius:20px;
    padding:16px 18px;
    font-size:15.5px;
    font-weight:500;
    line-height:1.55;
    margin-bottom:22px;
  }
  .msg .sign{display:block;margin-top:8px;font-weight:700;color:var(--pink)}
  .photo-wrap{width:150px;height:150px;margin:0 auto;position:relative}
  .photo-wrap img{
    display:none;
    width:150px;height:150px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid var(--pink-soft);
  }
  .photo-ph{
    width:150px;height:150px;
    border-radius:50%;
    border:3px dashed var(--pink-soft);
    background:#fff6f9;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    font-weight:700;
    color:#d98aa5;
    font-size:16px;
  }
  .photo-ph small{font-weight:500;font-size:11.5px;color:#e3a9bd}

  /* ---------- confetti canvas ---------- */
  #confetti{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:5;
  }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<main class="card">

  <!-- question screen -->
  <section id="ask">
    <span class="top-emoji" id="ask-emoji">🌷</span>
    <h1 id="q" class="pop">Chantille, will you be my girlfriend? 💗</h1>
    <div class="btns">
      <button class="btn btn-yes" id="yes">Yes 💗</button>
      <button class="btn btn-no" id="no">No</button>
    </div>
  </section>

  <!-- congrats screen -->
  <section id="win">
    <h1>YAYYYY!! 🎉💗</h1>
    <p class="sub">You said YES — best decision ever 😌</p>

    <!-- one-line-art: us, in a circle -->
    <svg class="badge" viewBox="0 0 200 200" aria-label="line art of us">
      <circle cx="100" cy="100" r="94" fill="#fff6f9" stroke="#ffd0de" stroke-width="5"/>
      <!-- heads leaning together -->
      <circle cx="78"  cy="94" r="20" fill="none" stroke="#ff5c8d" stroke-width="4.5" stroke-linecap="round"/>
      <circle cx="120" cy="88" r="17" fill="none" stroke="#ff5c8d" stroke-width="4.5" stroke-linecap="round"/>
      <!-- shoulders -->
      <path d="M44 164 C48 132 60 118 78 116 C90 115 98 122 101 134"
            fill="none" stroke="#ff5c8d" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M96 156 C100 130 106 112 120 109 C136 111 148 128 152 154"
            fill="none" stroke="#ff5c8d" stroke-width="4.5" stroke-linecap="round"/>
      <!-- heart above -->
      <path d="M100 56 c-3.2 -8 -14 -7.6 -14 1 c0 6.8 8.8 10 14 15 c5.2 -5 14 -8.2 14 -15 c0 -8.6 -10.8 -9 -14 -1 z"
            fill="#ff5c8d"/>
      <path d="M133 47 c-1.6 -4 -7 -3.8 -7 .5 c0 3.4 4.4 5 7 7.5 c2.6 -2.5 7 -4.1 7 -7.5 c0 -4.3 -5.4 -4.5 -7 -.5 z"
            fill="#ffb3c9"/>
    </svg>

    <p class="msg" id="love-msg">
      From the day I saw you on TikTok, I knew I had to talk to you.
      Thank you for saying yes — I'll show you effort and communication
      every single day. 🤍
      <span class="sign">— Wei Jie 💗</span>
    </p>

    <div class="photo-wrap">
      <img src="photo.jpg" alt="us" id="photo"
           onload="this.style.display='block';document.getElementById('photo-ph').style.display='none'">
      <div class="photo-ph" id="photo-ph">📸 us 💗<small>photo coming soon</small></div>
    </div>
  </section>

</main>

<script>
/* ---------------- question flow ---------------- */
const steps = [
  {text:"Chantille, will you be my girlfriend? 💗", emoji:"🌷", yes:1,    no:1,    noText:"No"},
  {text:"Are you sure? 🥺",                          emoji:"🥺", yes:1.2,  no:0.8,  noText:"No 😢"},
  {text:"Are you sure sure? 😢",                     emoji:"😢", yes:1.45, no:0.6,  noText:"No…"},
  {text:"Sure sure sure?? 🥹",                       emoji:"🥹", yes:1.7,  no:0.45, noText:"no"},
  {text:"You have to pick a yes 😌💗",               emoji:"😌", yes:1.35, no:1.35, noText:"YES!! 💖", final:true}
];
let step = 0;

const q = document.getElementById('q');
const askEmoji = document.getElementById('ask-emoji');
const yesBtn = document.getElementById('yes');
const noBtn = document.getElementById('no');

function render(){
  const s = steps[step];
  q.textContent = s.text;
  askEmoji.textContent = s.emoji;
  yesBtn.style.transform = `scale(${s.yes})`;
  noBtn.style.transform = `scale(${s.no})`;
  // scale() doesn't reserve layout space — pad the gap so grown buttons never overlap
  noBtn.style.marginTop = (((s.yes - 1) * yesBtn.offsetHeight + Math.max(0, s.no - 1) * noBtn.offsetHeight) / 2) + 'px';
  noBtn.textContent = s.noText;
  noBtn.classList.toggle('as-yes', !!s.final);
  yesBtn.classList.toggle('twin', !!s.final);
  noBtn.classList.toggle('twin', !!s.final);
  q.classList.remove('pop'); void q.offsetWidth; q.classList.add('pop');
}

noBtn.addEventListener('click', () => {
  if (steps[step].final) return win();
  step = Math.min(step + 1, steps.length - 1);
  render();
});
yesBtn.addEventListener('click', win);

/* ---------------- win ---------------- */
function win(){
  document.getElementById('ask').style.display = 'none';
  const w = document.getElementById('win');
  w.classList.add('show');
  document.title = 'She said YES 💗';
  burst(140);
  setTimeout(() => burst(90), 500);
  setTimeout(() => burst(70), 1100);
}

/* ---------------- petals ---------------- */
(function petals(){
  const kinds = ['🌸','💗','🤍','💮','🌸','💗'];
  for (let i = 0; i < 16; i++){
    const p = document.createElement('span');
    p.className = 'petal' + (Math.random() < .6 ? ' sway' : '');
    p.textContent = kinds[i % kinds.length];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (14 + Math.random() * 16) + 'px';
    const dur = 9 + Math.random() * 8;
    p.style.animationDuration = dur + 's';
    p.style.animationDelay = (-Math.random() * dur) + 's';
    document.body.appendChild(p);
  }
})();

/* ---------------- confetti ---------------- */
const cvs = document.getElementById('confetti');
const ctx = cvs.getContext('2d');
let pieces = [], rafId = null;

function sizeCanvas(){
  cvs.width = innerWidth * devicePixelRatio;
  cvs.height = innerHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
addEventListener('resize', sizeCanvas);
sizeCanvas();

const COLORS = ['#ff5c8d','#ffb3c9','#ffd700','#ffffff','#ff8fab','#f0437a'];

function burst(n){
  const cx = innerWidth / 2, cy = innerHeight * 0.38;
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2;
    const sp = 4 + Math.random() * 9;
    pieces.push({
      x: cx, y: cy,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 5,
      w: 6 + Math.random() * 6,
      h: 8 + Math.random() * 8,
      rot: Math.random() * Math.PI,
      vr: (Math.random() - .5) * .3,
      color: COLORS[(Math.random() * COLORS.length) | 0],
      emoji: Math.random() < .12 ? '💗' : null,
      life: 160 + Math.random() * 60
    });
  }
  if (!rafId) rafId = requestAnimationFrame(tick);
}

function tick(){
  ctx.clearRect(0, 0, innerWidth, innerHeight);
  pieces = pieces.filter(p => p.life > 0 && p.y < innerHeight + 40);
  for (const p of pieces){
    p.vy += 0.14;
    p.vx *= 0.992;
    p.x += p.vx; p.y += p.vy;
    p.rot += p.vr;
    p.life--;
    const alpha = Math.min(1, p.life / 50);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    if (p.emoji){
      ctx.font = '16px serif';
      ctx.fillText(p.emoji, -8, 6);
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    }
    ctx.restore();
  }
  rafId = pieces.length ? requestAnimationFrame(tick) : (ctx.clearRect(0,0,innerWidth,innerHeight), null);
}
</script>
</body>
</html>
